; fls30_shim.ini
; ================================================
; Configuration for the FLS30 packet driver shim.
; Place in same directory as FLS30.exe and fls30_loader.exe.
;
; The shim intercepts FLS30's calls to \Device\Packet* and
; redirects them to Npcap's \Device\NPF_{GUID} device.
;
; HOW TO FIND YOUR ADAPTER GUID
; ------------------------------
; Run in PowerShell:
;   Get-NetAdapter | Format-List Name, InterfaceGuid
;
; Or run:
;   fls30_loader.exe /listadapters
;
; The GUID looks like: {4D36E972-E325-11CE-BFC1-08002BE10318}
; ================================================

[Npcap]
; The GUID of the NIC connected to the DAU.
; If blank, the shim auto-detects the first available Npcap adapter.
; Format: {xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx}
AdapterGUID={1C08C389-F4FF-4A46-B8AB-9E5768689404}

[Adapter]
; The friendly name FLS30 will see in its adapter list.
; Must match what's configured inside FLS30 if it has a fixed adapter name.
FriendlyName=FLS30DAU

[Debug]
; Set to 1 to write verbose log to DebugView (Sysinternals)
; Run DebugView as Administrator, enable Capture Kernel + Capture Win32
Verbose=1
; Set to 1 to inject synthetic DAU frames (no hardware needed).
; FLS30 receives fake 0x01 0x01 ping replies + 0x03 0x03 data at 10 Hz.
TestMode=1
